name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt
      - name: Verify dependency consistency
        run: python -m pip check
      - name: Compile Python sources
        run: python -m compileall -q backend src tests
      - name: Run backend tests
        env:
          ENABLE_CHANGE_OVERVIEW: "false"
          RATE_LIMIT_ENABLED: "true"
        run: python -m unittest discover -s tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install exact frontend dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - name: Run frontend unit tests
        run: npm test
      - name: Build production frontend
        run: npm run build
